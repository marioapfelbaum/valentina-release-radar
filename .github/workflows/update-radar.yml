name: Update Release Radar

on:
  schedule:
    - cron: '0 4 */3 * *'  # Alle 3 Tage um 4:00 UTC
  workflow_dispatch:
    inputs:
      skip_crawler:
        description: 'Crawler überspringen (nur Fetch + Deploy)'
        type: boolean
        default: false
      crawler_time_budget:
        description: 'Crawler Time-Budget in Minuten'
        type: number
        default: 300

permissions:
  contents: write

concurrency:
  group: update-radar
  cancel-in-progress: false

jobs:
  crawl-network:
    if: ${{ github.event.inputs.skip_crawler != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run crawler with time budget
        env:
          DISCOGS_TOKEN: ${{ secrets.DISCOGS_TOKEN }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: |
          python crawler.py \
            --resume \
            --max-depth 2 \
            --time-budget ${{ github.event.inputs.crawler_time_budget || 300 }}

      - name: Commit updated network data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add network_data.json last_checked.json
          git diff --cached --quiet || git commit -m "chore: update network data [skip ci]"
          git push

  fetch-releases:
    needs: crawl-network
    if: always() && (needs.crawl-network.result == 'success' || needs.crawl-network.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull latest (falls Crawler committed hat)
        run: git pull --rebase

      - name: Fetch releases
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: |
          python fetch_multi.py \
            --sources bandcamp,spotify \
            --months 6

      - name: Commit updated releases
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add releases.json
          git diff --cached --quiet || git commit -m "chore: update releases [skip ci]"
          git push

  deploy:
    needs: fetch-releases
    if: always() && needs.fetch-releases.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Pull latest
        run: git pull --rebase

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          chmod +x deploy.sh
          ./deploy.sh
